apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse
  template:
    metadata:
      labels:
        app: warehouse
    spec:
      containers:
      - name: warehouse-container
        image: warehouse-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: db-storage
          mountPath: /Warehouse/db
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-service
spec:
  type: NodePort
  selector:
    app: warehouse
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001