<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Warehouse System - Widok Klienta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Katalog Produktów</h1>
            <span class="badge bg-primary">Widok Klienta</span>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nazwa produktu</th>
                            <th>Kategoria</th>
                            <th>Cena</th>
                            <th>Dostępność</th>
                            <th>Akcja</th>
                        </tr>
                        <tr>
                            <th>
                                <input type="text" id="nameFilter" class="form-control form-control-sm" placeholder="Szukaj produktu">
                            </th>
                            <th>
                                <select id="categoryFilter" class="form-select form-select-sm">
                                    <option value ="">Wszystkie kategorie</option>
                                </select>
                            </th>
                            <th>
                                <input type="number" id="priceFilter" class="form-control form-control-sm" min="0" step="0.01" placeholder="Maksymalna cena">
                            </th>
                            <th>
                                <select id="availabilityFilter" class="form-select form-select-sm">
                                    <option value ="">Dowolna dostępność</option>
                                    <option value="in_stock">W magazynie</option>
                                    <option value="out_of_stock">Brak w magazynie</option>
                                </select>
                            </th>
                            <th>
                                <button id="applyFilters" class="btn btn-sm btn-primary">Filtruj</button>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ product.name }}</td>
                            <td>{{ product.category.name }}</td>
                            <td>{{ product.price }} zł</td>
                            <td>
                                <span id="qty-{{ product.id }}" class="badge {% if product.quantity > 0 %}bg-success{% else %}bg-danger{% endif %}">
                                    {{ product.quantity }} szt.
                                </span>
                            </td>
                            <td>
                                <div class="input-group input-group-sm" style="max-width: 130px;">
                                    <button onclick="orderProduct({{ product.id }})"
                                        id="btn-{{ product.id }}"
                                        class="btn btn-sm btn-outline-primary"
                                        {% if product.quantity <= 0 %}disabled{% endif %}>
                                    Zamów
                                    </button>
                                    <input type="number"
                                           oninput="if(this.value > {{ product.quantity }}) this.value = {{ product.quantity }};"
                                           id="order-qty-{{ product.id }}" min="1" max="{{ product.quantity }}" value="1"
                                           class="form-control form-control-sm">
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function orderProduct(productId) {
            const btn = document.getElementById(`btn-${productId}`);
            const qtyBadge = document.getElementById(`qty-${productId}`);
            const orderQtyInput = document.getElementById(`order-qty-${productId}`);
            const quantity = parseInt(orderQtyInput.value, 10);
            if (isNaN(quantity) || quantity <= 0) {
                alert('Proszę wprowadzić prawidłową ilość do zamówienia.');
                return;
            }

            try {
                // Sending POST request to order the product
                const response = await fetch(`/api/products/${productId}/order?order_quantity=${quantity}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    const data = await response.json();

                    // Live actualization of the quantity badge
                    qtyBadge.innerText = `${data.remaining} szt.`;

                    if (data.remaining <= 0) {
                        qtyBadge.classList.replace('bg-success', 'bg-danger');
                        qtyBadge.innerText = "Brak w magazynie";
                        btn.disabled = true;
                    }

                    alert(`Sukces: ${data.message}`);
                } else {
                    const errorData = await response.json();
                    alert(`Błąd: ${errorData.detail}`);
                }
            } catch (error) {
                console.error('Błąd sieci:', error);
                alert('Nie udało się połączyć z API');
            }
        }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadProducts();


        document.getElementById('applyFilters').addEventListener('click', () => {
            const filters = {
                name: document.getElementById('nameFilter').value,
                category_id: document.getElementById('categoryFilter').value,
                price: document.getElementById('priceFilter').value,
                status: document.getElementById('availabilityFilter').value
            };
            loadProducts(filters);
        });
    });

    async function loadCategories() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();
            const select = document.getElementById('categoryFilter');

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        } catch (error) {
            console.error('Błąd podczas pobierania kategorii:', error);
        }
    }

    async function loadProducts(filters = {}) {
        try {
            const params = new URLSearchParams();
            if (filters.name) params.append('name', filters.name);
            if (filters.category_id) params.append('category_id', filters.category_id);
            if (filters.price) params.append('max_price', filters.price);
            if (filters.status) params.append('status', filters.status);

            const response = await fetch(`/api/products?${params.toString()}`);

            if (response.status === 404) {
                alert("Nie znaleziono produktów dla wybranych filtrów.");
                return;
            }

            const products = await response.json();
            renderTable(products);
        } catch (error) {
            console.error('Błąd podczas pobierania produktów:', error);
        }
    }

    function renderTable(products) {
    const tbody = document.querySelector('table tbody');
    tbody.innerHTML = '';

    products.forEach(p => {
        const tr = document.createElement('tr');

        const badgeClass = p.quantity > 0 ? 'bg-success' : 'bg-danger';
        const badgeText = p.quantity > 0 ? `${p.quantity} szt.` : 'Brak w magazynie';
        const isBtnDisabled = p.quantity <= 0 ? 'disabled' : '';

        tr.innerHTML = `
            <td>${p.name}</td>
            <td>${p.category ? p.category.name : 'Brak'}</td>
            <td>${parseFloat(p.price).toFixed(2)} zł</td>
            <td>
                <span id="qty-${p.id}" class="badge ${badgeClass}">
                    ${badgeText}
                </span>
            </td>
            <td>
                <div class="input-group input-group-sm" style="max-width: 130px;">
                    <button onclick="orderProduct(${p.id})"
                        id="btn-${p.id}"
                        class="btn btn-sm btn-outline-primary"
                        ${isBtnDisabled}>
                    Zamów
                    </button>
                    <input type="number"
                           oninput="if(this.value > ${p.quantity}) this.value = ${p.quantity};"
                           id="order-qty-${p.id}" min="1" max="${p.quantity}" value="1"
                           class="form-control form-control-sm">
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });
}
    </script>
</body>
</html>
