<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Warehouse System - Widok Klienta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Katalog Produktów</h1>
            <span class="badge bg-primary">Widok Klienta</span>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nazwa produktu</th>
                            <th>Kategoria</th>
                            <th>Cena</th>
                            <th>Dostępność</th>
                            <th>Akcja</th>
                        </tr>
                        <tr>
                            <th>
                                <input type="text" id="nameFilter" class="form-control form-control-sm" placeholder="Szukaj produktu">
                            </th>
                            <th>
                                <select id="categoryFilter" class="form-select form-select-sm">
                                    <option value ="">Wszystkie kategorie</option>
                                </select>
                            </th>
                            <th>
                                <input type="number" id="priceFilter" class="form-control form-control-sm" min="0" step="0.01" placeholder="Maksymalna cena">
                            </th>
                            <th>
                                <select id="availabilityFilter" class="form-select form-select-sm">
                                    <option value ="">Dowolna dostępność</option>
                                    <option value="in_stock">W magazynie</option>
                                    <option value="out_of_stock">Brak w magazynie</option>
                                </select>
                            </th>
                            <th>
                                <button id="applyFilters" class="btn btn-sm btn-primary">Filtruj</button>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ product.name }}</td>
                            <td>{{ product.category.name }}</td>
                            <td>{{ product.price }} zł</td>
                            <td>
                                <span id="qty-{{ product.id }}" class="badge {% if product.quantity > 0 %}bg-success{% else %}bg-danger{% endif %}">
                                    {{ product.quantity }} szt.
                                </span>
                            </td>
                            <td>
                                <div class="input-group input-group-sm" style="max-width: 130px;">
                                    <button onclick="orderProduct({{ product.id }})"
                                        id="btn-{{ product.id }}"
                                        class="btn btn-sm btn-outline-primary"
                                        {% if product.quantity <= 0 %}disabled{% endif %}>
                                    Zamów
                                    </button>
                                    <input type="number"
                                           oninput="if(this.value > {{ product.quantity }}) this.value = {{ product.quantity }};"
                                           id="order-qty-{{ product.id }}" min="1" max="{{ product.quantity }}" value="1"
                                           class="form-control form-control-sm">
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src={{ url_for('static', path='js/ordering.js') }}></script>
<script src={{ url_for('static', path='js/filtering.js') }}></script>
</body>
</html>
